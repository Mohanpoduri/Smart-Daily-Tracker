<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Daily Planner - Tasks, Routines, and Productivity">
    <title>Smart Daily Planner | Priority Task Engine</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Planner">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">
</head>
<body>

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-calendar-check-fill me-2"></i>
                <span class="brand-text">Smart Daily Planner</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <a href="/" class="nav-tab-link {% if request.endpoint == 'index' %}active{% endif %}">
                    <i class="bi bi-list-task me-1"></i>Tasks
                </a>
                <a href="/routine" class="nav-tab-link {% if request.endpoint == 'routine_page' %}active{% endif %}">
                    <i class="bi bi-journal-check me-1"></i>Daily Routine
                </a>
                <a href="/analysis" class="nav-tab-link {% if request.endpoint == 'analysis' %}active{% endif %}">
                    <i class="bi bi-graph-up me-1"></i>Analysis
                </a>
                <span class="badge bg-light text-dark px-3 py-2 clock-badge ms-2">
                    <i class="bi bi-clock me-1"></i><span id="live-clock"></span>
                </span>
            </div>
        </div>
    </nav>

    <!-- ═══ ALARM OVERLAY ═══ -->
    <div id="alarm-overlay" class="alarm-overlay" style="display:none;">
        <div class="alarm-modal">
            <div class="alarm-icon-wrap"><i class="bi bi-alarm-fill alarm-icon-pulse"></i></div>
            <h2 class="alarm-title">⏰ Task Reminder!</h2>
            <p class="alarm-task-name" id="alarm-task-name"></p>
            <span class="badge alarm-priority-badge" id="alarm-priority-badge"></span>
            <p class="alarm-time-text mt-2" id="alarm-time-text"></p>
            <button class="btn btn-alarm-dismiss" id="alarm-dismiss-btn">
                <i class="bi bi-check-lg me-1"></i> Dismiss Alarm
            </button>
        </div>
    </div>

    <!-- ═══ TOAST CONTAINER ═══ -->
    <div id="reminder-toast-container" class="reminder-toast-container"></div>

    <!-- ═══ MAIN ═══ -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer class="app-footer">
        <div class="container text-center">
            <p class="mb-0">
                <i class="bi bi-heart-fill text-danger me-1"></i>
                Smart Daily Planner &copy; 2024 &mdash; Built with Flask &amp; Bootstrap
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <!-- PWA: Install Prompt Banner -->
    <div id="pwa-install-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:9999;
        background:linear-gradient(135deg,#4f46e5,#818cf8); padding:1rem 1.25rem; color:#fff;
        box-shadow:0 -4px 20px rgba(0,0,0,.2); animation: slideUp .4s ease;">
        <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div class="d-flex align-items-center gap-2">
                <i class="bi bi-phone-fill" style="font-size:1.4rem"></i>
                <div>
                    <strong style="font-size:.95rem">Install Smart Daily Planner</strong>
                    <p class="mb-0" style="font-size:.8rem;opacity:.85">Add to your home screen for quick access</p>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button id="pwa-install-btn" class="btn btn-light btn-sm px-3" style="font-weight:700;border-radius:50px">
                    <i class="bi bi-download me-1"></i>Install
                </button>
                <button id="pwa-dismiss-btn" class="btn btn-outline-light btn-sm px-3" style="border-radius:50px" onclick="
                    document.getElementById('pwa-install-banner').style.display='none'">
                    Later
                </button>
            </div>
        </div>
    </div>

    <!-- PWA: Offline Indicator -->
    <div id="offline-indicator" style="display:none; position:fixed; top:70px; left:50%; transform:translateX(-50%);
        z-index:9998; background:#ef4444; color:#fff; padding:.5rem 1.25rem; border-radius:50px; font-size:.82rem;
        font-weight:600; box-shadow:0 4px 12px rgba(239,68,68,.4);">
        <i class="bi bi-wifi-off me-1"></i> You are offline
    </div>

    <!-- PWA: Service Worker Registration + Install Logic -->
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
                    .then(reg => console.log('[PWA] SW registered, scope:', reg.scope))
                    .catch(err => console.log('[PWA] SW registration failed:', err));
            });
        }

        // Install Prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('pwa-install-banner').style.display = 'block';
        });

        document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const result = await deferredPrompt.userChoice;
            console.log('[PWA] Install result:', result.outcome);
            deferredPrompt = null;
            document.getElementById('pwa-install-banner').style.display = 'none';
        });

        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed!');
            document.getElementById('pwa-install-banner').style.display = 'none';
        });

        // Offline/Online indicator
        window.addEventListener('offline', () => {
            document.getElementById('offline-indicator').style.display = 'block';
        });
        window.addEventListener('online', () => {
            document.getElementById('offline-indicator').style.display = 'none';
        });
    </script>

    <style>
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</body>
</html>
